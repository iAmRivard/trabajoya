services:
  trabajoya:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TRABAJOYA_WHATSAPP_NUMBER: ${VITE_TRABAJOYA_WHATSAPP_NUMBER:-}
        VITE_TRABAJOYA_WHATSAPP_MESSAGE: ${VITE_TRABAJOYA_WHATSAPP_MESSAGE:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      API_PORT: 8787
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: trabajoya
      PGUSER: trabajoya_dbeaver
      PGPASSWORD: ${TRABAJOYA_DB_PASSWORD}
      ALLOWED_ORIGIN: ${PUBLIC_APP_URL}
      TRABAJOYA_ADMIN_PASSWORD: ${TRABAJOYA_ADMIN_PASSWORD}
      TRABAJOYA_SESSION_SECRET: ${TRABAJOYA_SESSION_SECRET}
      TRABAJOYA_INTAKE_API_KEY: ${TRABAJOYA_INTAKE_API_KEY}
      TRABAJOYA_DATASET_API_KEY: ${TRABAJOYA_DATASET_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MATCH_MODEL: ${OPENAI_MATCH_MODEL:-gpt-5.4-mini}
      MATCH_MIN_INTERVAL_SECONDS: ${MATCH_MIN_INTERVAL_SECONDS:-60}
      MATCH_MAX_RESULTS_PER_TYPE: ${MATCH_MAX_RESULTS_PER_TYPE:-5}
      MATCH_MAX_COURSES: ${MATCH_MAX_COURSES:-3}
      EXA_JOB_FRESH_DAYS: ${EXA_JOB_FRESH_DAYS:-45}
      EXA_JOB_MAX_AGE_HOURS: ${EXA_JOB_MAX_AGE_HOURS:-6}
      ELEVENLABS_INTERVIEW_AGENT_ID: ${ELEVENLABS_INTERVIEW_AGENT_ID:-}
      TRABAJOYA_INTERVIEW_API_KEY: ${TRABAJOYA_INTERVIEW_API_KEY:-}
      N8N_INTERVIEW_FEEDBACK_WEBHOOK_URL: ${N8N_INTERVIEW_FEEDBACK_WEBHOOK_URL:-https://n8n.rivasystems.dev/webhook/trabajoya/save-interview-feedback}
      VOICE_FEEDBACK_API_URL: ${VOICE_FEEDBACK_API_URL:-}
      VOICE_FEEDBACK_API_KEY: ${VOICE_FEEDBACK_API_KEY:-}
      VOICE_FEEDBACK_MESSAGE_API_URL: ${VOICE_FEEDBACK_MESSAGE_API_URL:-}
      VOICE_FEEDBACK_MESSAGE_API_KEY: ${VOICE_FEEDBACK_MESSAGE_API_KEY:-}
      VOICE_FEEDBACK_MESSAGE_TEXT: ${VOICE_FEEDBACK_MESSAGE_TEXT:-}
      VOICE_FEEDBACK_MAX_CHARS: ${VOICE_FEEDBACK_MAX_CHARS:-700}
      VOICE_FEEDBACK_TIMEOUT_MS: ${VOICE_FEEDBACK_TIMEOUT_MS:-12000}
    labels:
      traefik.enable: "true"
      traefik.http.routers.trabajoya-web.entrypoints: web
      traefik.http.routers.trabajoya-web.rule: Host(`${TRABAJOYA_DOMAIN}`)
      traefik.http.routers.trabajoya-web.middlewares: redirect-to-https@file
      traefik.http.routers.trabajoya-web.service: trabajoya-web
      traefik.http.routers.trabajoya-websecure.entrypoints: websecure
      traefik.http.routers.trabajoya-websecure.rule: Host(`${TRABAJOYA_DOMAIN}`)
      traefik.http.routers.trabajoya-websecure.service: trabajoya-websecure
      traefik.http.routers.trabajoya-websecure.tls.certresolver: letsencrypt
      traefik.http.services.trabajoya-web.loadbalancer.server.port: "8787"
      traefik.http.services.trabajoya-websecure.loadbalancer.server.port: "8787"
    networks:
      - dokploy-network
      - n8n-n8nwithpostgres-wpwp8h

networks:
  dokploy-network:
    external: true
  n8n-n8nwithpostgres-wpwp8h:
    external: true
